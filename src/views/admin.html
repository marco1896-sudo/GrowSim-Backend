<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GrowSim Admin Dashboard</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #d1d5db;
        --accent: #0f766e;
        --accent-soft: #dff5f2;
        --danger: #b91c1c;
        --danger-soft: #fee2e2;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: var(--text);
        background:
          radial-gradient(1400px 500px at 10% -20%, #d8f5ef 0%, transparent 60%),
          radial-gradient(1200px 450px at 100% -10%, #dce8ff 0%, transparent 55%),
          var(--bg);
      }
      .layout {
        max-width: 1380px;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        gap: 16px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      h1, h2, h3 {
        margin: 0;
      }
      h1 {
        font-size: 1.5rem;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 10px;
      }
      .stat {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
      }
      .stat .label {
        font-size: 0.8rem;
        color: var(--muted);
      }
      .stat .value {
        margin-top: 6px;
        font-size: 1.4rem;
        font-weight: 700;
      }
      .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.82rem;
      }
      .filters {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 8px;
      }
      input, select, button, textarea {
        width: 100%;
        font: inherit;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        background: #fff;
      }
      button {
        width: auto;
        cursor: pointer;
      }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        font-weight: 600;
      }
      button.danger {
        background: var(--danger);
        border-color: var(--danger);
        color: #fff;
      }
      .table-wrap {
        overflow-x: auto;
      }
      .users-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.92rem;
        min-width: 980px;
      }
      .users-table th, .users-table td {
        border-bottom: 1px solid var(--border);
        padding: 10px 8px;
        text-align: left;
        vertical-align: top;
      }
      .users-table th {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 600;
      }
      .user-cell {
        display: grid;
        gap: 2px;
      }
      .badge {
        display: inline-block;
        border: 1px solid #9ca3af;
        border-radius: 999px;
        font-size: 0.75rem;
        padding: 2px 8px;
        margin: 2px 4px 0 0;
        background: #f9fafb;
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 3px 10px;
        font-size: 0.78rem;
        font-weight: 600;
      }
      .status-active {
        color: #0f766e;
        background: var(--accent-soft);
      }
      .status-banned {
        color: #991b1b;
        background: var(--danger-soft);
      }
      .small {
        color: var(--muted);
        font-size: 0.8rem;
      }
      .actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        align-items: center;
      }
      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
        gap: 16px;
      }
      .detail-shell {
        display: grid;
        gap: 16px;
      }
      .detail-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }
      .detail-header.compact {
        align-items: center;
      }
      .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }
      .detail-section {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
        display: grid;
        gap: 12px;
      }
      .detail-list {
        display: grid;
        gap: 8px;
      }
      .detail-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      .detail-row .label {
        color: var(--muted);
      }
      .stack {
        display: grid;
        gap: 6px;
      }
      .top-gap {
        margin-top: 8px;
      }
      textarea {
        resize: vertical;
        min-height: 120px;
      }
      .audit-list {
        max-height: 320px;
        overflow: auto;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .audit-list li {
        border-bottom: 1px solid var(--border);
        padding: 10px 0;
      }
      .audit-title {
        font-weight: 600;
      }
      .error {
        color: #991b1b;
        min-height: 20px;
      }
      @media (max-width: 980px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }
        .meta {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <header class="topbar panel">
        <h1>GrowSim Admin Dashboard</h1>
        <div class="actions">
          <button id="refresh-btn">Aktualisieren</button>
          <button id="logout-btn" class="danger">Logout</button>
        </div>
      </header>

      <section class="panel">
        <div class="stats" id="stats"></div>
        <div class="hint" id="stats-note"></div>
      </section>

      <section class="panel">
        <div class="filters">
          <input id="search" placeholder="Suche (Name, Email, Username)" />
          <select id="role-filter">
            <option value="">Alle Rollen</option>
            <option value="user">user</option>
            <option value="tester">tester</option>
            <option value="moderator">moderator</option>
            <option value="admin">admin</option>
          </select>
          <select id="banned-filter">
            <option value="">Status: alle</option>
            <option value="false">aktiv</option>
            <option value="true">gebannt</option>
          </select>
          <input id="badge-filter" placeholder="Badge filtern" />
          <select id="sort-by">
            <option value="createdAt">Sortierung: Registrierung</option>
            <option value="lastLoginAt">Sortierung: Letzter Login</option>
            <option value="role">Sortierung: Rolle</option>
          </select>
          <select id="sort-order">
            <option value="desc">Absteigend</option>
            <option value="asc">Aufsteigend</option>
          </select>
          <select id="limit-filter">
            <option value="10">10 pro Seite</option>
            <option value="25" selected>25 pro Seite</option>
            <option value="50">50 pro Seite</option>
            <option value="100">100 pro Seite</option>
          </select>
          <button class="primary" id="filter-btn">Filtern</button>
        </div>
        <div class="error" id="error"></div>
      </section>

      <section class="panel">
        <div class="table-wrap">
          <table class="users-table">
            <thead>
              <tr>
                <th>User</th>
                <th>Rolle</th>
                <th>Status</th>
                <th>Registriert</th>
                <th>Letzter Login</th>
                <th>Badges</th>
                <th>Aktionen</th>
              </tr>
            </thead>
            <tbody id="users-body"></tbody>
          </table>
        </div>
        <div class="meta">
          <div id="pagination-info" class="small"></div>
          <div class="actions">
            <button id="prev-page">Zurück</button>
            <button id="next-page">Weiter</button>
          </div>
        </div>
      </section>

      <section class="grid-2">
        <div class="panel">
          <h2>User Details</h2>
          <div id="details" class="small top-gap">Noch kein User ausgewählt.</div>
        </div>
        <div class="panel">
          <h2>Globales Audit-Log</h2>
          <ul class="audit-list top-gap" id="audit-list"></ul>
        </div>
      </section>
    </div>

    <script src="/admin-static/admin.js" defer></script>
  </body>
</html>
