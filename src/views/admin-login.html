<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GrowSim Admin Login</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f9;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #d1d5db;
        --accent: #0f766e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: radial-gradient(circle at top, #e5f7f3 0%, var(--bg) 48%);
        color: var(--text);
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .card {
        width: min(560px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
      }
      h1 { margin: 0 0 12px; font-size: 1.5rem; }
      p { margin: 0 0 16px; color: var(--muted); }
      textarea {
        width: 100%;
        min-height: 120px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
      }
      button {
        margin-top: 12px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .error {
        margin-top: 12px;
        color: #991b1b;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main class="card">
        <h1>GrowSim Admin</h1>
        <p>Bitte JWT-Token einfuegen (aus `/api/auth/login`) und Session starten.</p>
        <form id="login-form">
          <textarea id="token" placeholder="Bearer Token"></textarea>
          <button type="submit">Admin Session starten</button>
          <div class="error" id="error"></div>
        </form>
      </main>
    </div>
    <script src="/static/admin-login.js" defer></script>
  </body>
</html>
