<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GrowSim Admin Dashboard</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #d1d5db;
        --accent: #0f766e;
        --danger: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: var(--text);
        background:
          radial-gradient(1400px 500px at 10% -20%, #d8f5ef 0%, transparent 60%),
          radial-gradient(1200px 450px at 100% -10%, #dce8ff 0%, transparent 55%),
          var(--bg);
      }
      .layout {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        gap: 16px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
      }
      .stat {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
      }
      .stat .label {
        font-size: 0.8rem;
        color: var(--muted);
      }
      .stat .value {
        margin-top: 6px;
        font-size: 1.4rem;
        font-weight: 700;
      }
      .filters {
        display: grid;
        grid-template-columns: 1fr repeat(4, minmax(100px, auto));
        gap: 8px;
      }
      input, select, button, textarea {
        font: inherit;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        background: #fff;
      }
      button {
        cursor: pointer;
      }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        font-weight: 600;
      }
      button.danger {
        background: var(--danger);
        border-color: var(--danger);
        color: #fff;
      }
      .users-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.92rem;
      }
      .users-table th, .users-table td {
        border-bottom: 1px solid var(--border);
        padding: 8px;
        text-align: left;
        vertical-align: top;
      }
      .badge {
        display: inline-block;
        border: 1px solid #9ca3af;
        border-radius: 999px;
        font-size: 0.75rem;
        padding: 2px 8px;
        margin: 2px 4px 0 0;
        background: #f9fafb;
      }
      .small {
        color: var(--muted);
        font-size: 0.8rem;
      }
      .actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .audit-list {
        max-height: 260px;
        overflow: auto;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .audit-list li {
        border-bottom: 1px solid var(--border);
        padding: 8px 0;
      }
      .error {
        color: #991b1b;
        min-height: 20px;
      }
      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
      }
      @media (max-width: 980px) {
        .filters { grid-template-columns: 1fr 1fr; }
        .grid-2 { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <header class="topbar panel">
        <h1>GrowSim Admin Dashboard</h1>
        <div class="actions">
          <button id="refresh-btn">Aktualisieren</button>
          <button id="logout-btn" class="danger">Logout</button>
        </div>
      </header>

      <section class="panel">
        <div class="stats" id="stats"></div>
      </section>

      <section class="panel">
        <div class="filters">
          <input id="search" placeholder="Suche (Name, Email, Username)" />
          <select id="role-filter">
            <option value="">Alle Rollen</option>
            <option value="user">user</option>
            <option value="tester">tester</option>
            <option value="moderator">moderator</option>
            <option value="admin">admin</option>
          </select>
          <select id="banned-filter">
            <option value="">Banned: alle</option>
            <option value="false">nicht gebannt</option>
            <option value="true">gebannt</option>
          </select>
          <select id="limit-filter">
            <option value="10">10</option>
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
          <button class="primary" id="filter-btn">Filtern</button>
        </div>
        <div class="error" id="error"></div>
      </section>

      <section class="panel">
        <table class="users-table">
          <thead>
            <tr>
              <th>User</th>
              <th>Rolle</th>
              <th>Status</th>
              <th>Badges</th>
              <th>Aktionen</th>
            </tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
        <div class="meta">
          <div id="pagination-info" class="small"></div>
          <div class="actions">
            <button id="prev-page">Zurück</button>
            <button id="next-page">Weiter</button>
          </div>
        </div>
      </section>

      <section class="grid-2">
        <div class="panel">
          <h2 style="margin-top:0;">User Details</h2>
          <div id="details" class="small">Noch kein User ausgewählt.</div>
        </div>
        <div class="panel">
          <h2 style="margin-top:0;">Audit Log</h2>
          <ul class="audit-list" id="audit-list"></ul>
        </div>
      </section>
    </div>

    <script src="/admin-static/admin.js" defer></script>
  </body>
</html>
